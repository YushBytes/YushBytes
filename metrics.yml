name: Generate Metrics

on:
  schedule:
    - cron: "0 4 * * *"   # every day at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/metrics.svg
          committer_message: "🤖 update metrics"
          # A few strong plugins for an AI/ML profile — add more from
          # https://github.com/lowlighter/metrics if you want:
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_details: bytes-size, percentage
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_lines: yes
          plugin_traffic: yes
